name: .NET CI/CD Pipeline

on:
  push:
    branches: [ "master", "development" ]
  pull_request:
    branches: [ "master", "development" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # JOB 1: Build & Test (CI - Continuous Integration)
  # ----------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out .NET repo
        uses: actions/checkout@v4

      - name: Check out Python forecasting repo
        uses: actions/checkout@v4
        with:
          repository: LeadstarlingX/gridtrack-forecasting
          path: gridtrack-forecasting
          # If the repo is private, add a PAT to repo secrets and uncomment:
          token: ${{ secrets.GH_PAT }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Taskfile CLI
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install coverage tools
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run CI Pipeline
        run: task ci
        env:
          GRIDTRACK_FORECASTING_PATH: ${{ github.workspace }}/gridtrack-forecasting
          GRIDTRACK_REBUILD_PYTHON_IMAGE: "true"

      - name: Post coverage summary
        if: always()
        run: |
          if [ -f ./TestResults/CoverageReport/SummaryGithub.md ]; then
            cat ./TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/
          
#  deploy:
#    runs-on: ubuntu-latest
#    needs: build-and-test
#    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
#    steps:
#      - name: Trigger Render deploy
#        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" > /dev/null

  # ----------------------------------------------------------------
  # JOB 2: k6 load test (master only, free-tier friendly)
  # ----------------------------------------------------------------
  k6-load-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Check out .NET repo
        uses: actions/checkout@v4

      - name: Install Taskfile CLI
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      # Brings up compose.ci.yaml (db+redis+rabbitmq+api), runs k6 QUICK, tears down.
      # continue-on-error: latency thresholds are environment-sensitive on a 2-vCPU
      # shared runner — we surface the numbers but don't block master on perf noise.
      # Functional health (error rate, 2xx) is still visible in the summary.
      - name: Run k6 load test
        run: task k6-ci
        continue-on-error: true
        env:
          DRIVER_VUS: "300"

      - name: Publish k6 summary
        if: always()
        run: |
          if [ -f load-tests/results/latest-write-behind.md ]; then
            cat load-tests/results/latest-write-behind.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No k6 summary produced — check the load test step logs." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: load-tests/results/

  update-readme:
    runs-on: ubuntu-latest
    needs: [ build-and-test, k6-load-test ]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/development')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport
      

      - name: Download k6 results
        uses: actions/download-artifact@v4
        with:
          name: k6-results
          path: load-tests/results/

      - name: Install Taskfile CLI
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

      - name: Update README coverage and k6 tables
        run: task update-readme

      - name: Commit README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "ci: update coverage and k6 tables [without ci]"
          git push