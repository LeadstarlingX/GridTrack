# Minimal, Linux/CI-friendly stack for the k6 load test in GitHub Actions.
#
# Why a separate file: the main compose.yaml mounts Windows bind paths
# (.\.containers\...) and depends on OSRM (needs a prebuilt Syria map extract)
# and ClickHouse. None of that exists on a GitHub runner. This file brings up
# only what the write-behind + analytics load paths need — db, redis, rabbitmq,
# api — with no host volumes, simulation off, and ClickHouse disabled.
#
# Usage (CI): docker compose -f compose.ci.yaml up -d --build
services:
  gridtrack.db:
    image: postgis/postgis:18-3.6
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_DB: gridtrack_docker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gridtrack_docker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  gridtrack.redis:
    image: redis:8.4.0
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      
      
  gridtrack.clickhouse:
    image: clickhouse/clickhouse-server:25.1-alpine
    environment:
      CLICKHOUSE_DB: gridtrack
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  gridtrack.rabbitmq:
    image: rabbitmq:management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
      
  gridtrack.seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:5341"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5341/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gridtrack.api:
    image: gridtrack.api
    build:
      context: .
      dockerfile: GridTrack.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__ClickHouse: "Host=gridtrack.clickhouse;Port=8123;Database=gridtrack"
      Simulation__Enabled: "false"        # k6 is the only load source
      FORCE_RESEED: "true"                # fresh seeded drivers each run
      Osrm__BaseUrl: "http://gridtrack.osrm:5000"
    ports:
      - "5098:8080"
    depends_on:
      gridtrack.db:
        condition: service_healthy
      gridtrack.redis:
        condition: service_healthy
      gridtrack.rabbitmq:
        condition: service_healthy
      gridtrack.clickhouse:
        condition: service_healthy
      gridtrack.osrm:
        condition: service_healthy
      gridtrack-seq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s   
        
        
  
  gridtrack.osrm:
    # Trivial stub that returns a fixed canned route for any request — no Dockerfile needed
    # Response shape matches OsrmService.cs expectations: routes[0].geometry.coordinates as GeoJSON [lng,lat]
    image: python:3.12-alpine
    environment:
      OSRM_LATENCY_MS: "10"        # Default: 10ms (fast LAN)
      OSRM_LATENCY_JITTER_MS: "5"  # ±5ms jitter
    command:
      - "python"
      - "-c"
      - |
        import json, random, time, os
        from http.server import HTTPServer, BaseHTTPRequestHandler
        
        LATENCY = int(os.environ.get('OSRM_LATENCY_MS', '10'))
        JITTER = int(os.environ.get('OSRM_LATENCY_JITTER_MS', '5'))
        
        class H(BaseHTTPRequestHandler):
            def do_GET(self):
                # Simulate realistic OSRM processing time
                delay = max(0, LATENCY + random.randint(-JITTER, JITTER))
                if delay > 0:
                    time.sleep(delay / 1000.0)
        
                r = {
                    "code": "Ok",
                    "routes": [{
                        "legs": [{
                            "steps": [],
                            "weight": 100.0,
                            "summary": "",
                            "duration": 100.0,
                            "distance": 500.0
                        }],
                        "weight_name": "routability",
                        "weight": 100.0,
                        "duration": 100.0,
                        "distance": 500.0,
                        "geometry": {
                            "type": "LineString",
                            "coordinates": [
                                [36.0, 33.0],
                                [36.05, 33.05],
                                [36.1, 33.1]
                            ]
                        }
                    }],
                    "waypoints": [
                        {"location": [36.0, 33.0], "name": "", "distance": 0.0},
                        {"location": [36.1, 33.1], "name": "", "distance": 0.0}
                    ]
                }
                self.send_response(200)
                self.send_header("Content-Type","application/json")
                self.end_headers()
                self.wfile.write(json.dumps(r).encode())
        
            def log_message(self, format, *args):
                pass  # Suppress logs
        
        HTTPServer(("0.0.0.0",5000),H).serve_forever()
    ports:
      - "5001:5000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/route/v1/driving/0,0;1,1')" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
