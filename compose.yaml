services:
  
  softqutest.api:
    image: softqutest.api
    container_name: SoftquTest.Api
    build:
      context: .
      dockerfile: SoftquTest.Api/Dockerfile

    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - 5002:8080
      - 5001:8081
    depends_on:
      softqutest.db:
        condition: service_healthy
      softqutest.redis:
        condition: service_started
    networks:
      - default

    restart: 
        always
  
  softqutest.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: SoftquTest.Db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Pass1234!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Pass1234! -Q 'SELECT 1' || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  
  softqutest.seq:
    image: datalust/seq:2025.2
    container_name: SoftquTest.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True
    ports:
      - 5341:5341
      - 8080:80
    restart: always
  
  softqutest.redis:
    image: redis:8.4.0
    container_name: SoftquTest.redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  sqlserver_data: