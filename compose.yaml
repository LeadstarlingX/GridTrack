services:

  gridtrack.db:
    image: postgis/postgis:18-3.6
    container_name: GridTrack.Db
    command: ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=256MB"]
    environment:
      POSTGRES_DB: gridtrack_docker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gridtrack_docker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  gridtrack.redis:
    image: redis:8.4.0
    container_name: GridTrack.Redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  gridtrack.rabbitmq:
    image: rabbitmq:management-alpine
    container_name: GridTrack.RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./.containers/queue/data:/var/lib/rabbitmq
      - ./.containers/queue/log:/var/log/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  gridtrack.seq:
    image: datalust/seq:2025.2
    container_name: GridTrack.Seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:5341"
      - "8080:80"     # Seq UI  →  http://localhost:8080
    restart: unless-stopped

  gridtrack.osrm:
    image: osrm/osrm-backend:latest
    container_name: GridTrack.OSRM
    command: osrm-routed --algorithm mld /data/syria-latest.osrm
    volumes:
      - ./.containers/osrm:/data
    ports:
      - "5001:5000"
    restart: unless-stopped

  gridtrack.clickhouse:
    image: clickhouse/clickhouse-server:25.1-alpine
    container_name: GridTrack.ClickHouse
    environment:
      CLICKHOUSE_DB: gridtrack
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./.containers/clickhouse:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP interface — used by ClickHouse.Client
      - "9000:9000"   # Native TCP interface
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  gridtrack.api:
    image: gridtrack.api
    container_name: GridTrack.Api
    build:
      context: .
      dockerfile: GridTrack.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Cors__AllowedOrigin: "http://localhost:5173"
      Clerk__Authority: "${CLERK_AUTHORITY}"
      Python__BaseUrl: "http://gridtrack.python:8000"
      Osrm__BaseUrl: "http://gridtrack.osrm:5000"
      ConnectionStrings__ClickHouse: "Host=gridtrack.clickhouse;Port=8123;Database=gridtrack"
      Simulation__Enabled: "true"
      Simulation__PositionUpdateIntervalMs: "500"
      FORCE_RESEED: "${FORCE_RESEED:-false}"  # Override per-run: $env:FORCE_RESEED="true"; docker compose up -d gridtrack.api
    ports:
      - "5098:8080"   # same port as local dev — frontend .env.local needs no change
    depends_on:
      gridtrack.db:
        condition: service_healthy
      gridtrack.redis:
        condition: service_healthy
      gridtrack.rabbitmq:
        condition: service_healthy
      gridtrack.clickhouse:
        condition: service_healthy
      gridtrack.osrm:
        condition: service_started
    restart: unless-stopped

  gridtrack.python:
    image: gridtrack.python
    container_name: GridTrack.Python
    build:
      context: "D:/CodingProjects/gridtrack-forecasting"
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: "amqp://guest:guest@gridtrack.rabbitmq:5672"
      GROQ_API_KEY: "${GROQ_API_KEY}"
    ports:
      - "8000:8000"   # FastAPI docs  →  http://localhost:8000/docs
    depends_on:
      gridtrack.rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
