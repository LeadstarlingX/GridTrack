# ─────────────────────────────────────────────────────────────────────────────
# GridTrack backend stack — starts everything except the React frontend.
#   Backend:  docker compose up -d
#   Frontend: cd ..\GridTrack.Web && npm run dev
#
# Secrets (GROQ_API_KEY, CLERK_AUTHORITY) must be present in a .env file
# at this directory.  See .env.example for the required keys.
#
# Optional observability (Grafana, Tempo, Prometheus, Loki):
#   docker compose -f compose.yaml -f compose.observability.yaml up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────────────────────

  gridtrack.db:
    image: postgis/postgis:18-3.6
    container_name: GridTrack.Db
    environment:
      POSTGRES_DB: gridtrack_docker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gridtrack_docker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  gridtrack.redis:
    image: redis:8.4.0
    container_name: GridTrack.redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  gridtrack.rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: GridTrack.RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - ./.containers/queue/data:/var/lib/rabbitmq
      - ./.containers/queue/log:/var/log/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── Structured logging (lightweight, useful for debugging) ───────────────

  gridtrack.seq:
    image: datalust/seq:2025.2
    container_name: GridTrack.Seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "True"
    ports:
      - "5341:5341"
      - "8080:80"     # Seq UI  →  http://localhost:8080
    restart: unless-stopped

  # ── Application services ─────────────────────────────────────────────────

  gridtrack.api:
    image: gridtrack.api
    container_name: GridTrack.Api
    build:
      context: .
      dockerfile: GridTrack.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Cors__AllowedOrigin: "http://localhost:5173"
      Clerk__Authority: "${CLERK_AUTHORITY}"
      Python__BaseUrl: "http://gridtrack.python:8000"
      Osrm__BaseUrl: "http://router.project-osrm.org"
      Simulation__Enabled: "true"
      Simulation__PositionUpdateIntervalMs: "200"
    ports:
      - "5098:8080"   # same port as local dev — frontend .env.local needs no change
    depends_on:
      gridtrack.db:
        condition: service_healthy
      gridtrack.redis:
        condition: service_healthy
      gridtrack.rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  gridtrack.python:
    image: gridtrack.python
    container_name: GridTrack.Python
    build:
      context: "D:/CodingProjects/gridtrack-forecasting"
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: "amqp://guest:guest@gridtrack.rabbitmq:5672"
      GROQ_API_KEY: "${GROQ_API_KEY}"
    ports:
      - "8000:8000"   # FastAPI docs  →  http://localhost:8000/docs
    depends_on:
      gridtrack.rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
