services:
  
  gridtrack.api:
    image: gridtrack.api
    container_name: GridTrack.Api
    build:
      context: .
      dockerfile: GridTrack.Api/Dockerfile

    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - 5002:8080
      - 5001:8081
    depends_on:
      gridtrack.db:
        condition: service_healthy
      gridtrack.redis:
        condition: service_started
    networks:
      - default

    restart: 
        always
  
  gridtrack.db:
    image: postgis/postgis:18-3.6
    container_name: GridTrack.Db
    environment:
      - POSTGRES_DB=gridtrack_docker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./.containers/database:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d gridtrack_docker" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
  
  
  gridtrack.seq:
    image: datalust/seq:2025.2
    container_name: GridTrack.Seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=True
    ports:
      - 5341:5341
      - 8080:80
    restart: always
  
  gridtrack.redis:
    image: redis:8.4.0
    container_name: GridTrack.redis
    restart: always
    ports:
      - "6379:6379"
  
  
  
  gridtrack.rabbitmq:
    image: rabbitmq:management-alpine
    container_name: GridTrack.RabbitMQ
    volumes:
      - ./.containers/queue/data:/var/lib/rabbitmq
      - ./.containers/queue/log:/var/log/rabbitmq

    environment:
      RABBIT_DEFAULT_USER: "guest"
      RABBIT_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    restart: always
  
  # Telemetry
  
  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: gridtrack-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - tempo
      - prometheus
      - loki

    # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:latest
    container_name: gridtrack-tempo
    user: root
    restart: unless-stopped
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query
      
  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: gridtrack-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
        
  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: gridtrack-loki
    restart: unless-stopped
    command: [ "-config.file=/etc/loki/loki.yaml" ]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"
        
volumes:
  grafana-data:
  tempo-data:
  prometheus-data:
  loki-data: