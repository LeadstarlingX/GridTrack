version: '3'

vars:
  IMAGE_NAME: gridtrack.api
  IMAGE_TAG: latest
  APP_LABEL: gridtrack-api
  COVERAGE_DIR: ./TestResults/Coverage
  REPORT_DIR: ./TestResults/CoverageReport

tasks:
  # ============================================
  # BUILD TASKS
  # ============================================
  
  restore:
    desc: Restore .NET dependencies
    cmds:
      - dotnet restore

  build:
    desc: Build .NET application
    deps: [restore]
    cmds:
      - dotnet build --no-restore --configuration Release


  # ============================================
  # TEST TASKS (no coverage)
  # ============================================

  test-architecture:
    desc: Run architecture tests
    deps: [build]
    cmds:
      - dotnet run --project ./GridTrack.ArchitectureTests/GridTrack.ArchitectureTests.csproj --configuration Release -- --report-trx --report-trx-filename architecture-test-results.trx --results-directory ./TestResults/Architecture

  test-domain:
    desc: Run domain unit tests
    cmds:
      - dotnet run --project ./GridTrack.Domain.UnitTests/GridTrack.Domain.UnitTests.csproj --configuration Release -- --report-trx --report-trx-filename domain-unit-test-results.trx --results-directory ./TestResults/DomainUnit
  
  test-namingconventions:
    desc: Run naming convention tests
    cmds:
      - dotnet run --project ./GridTrack.NamingConventions/GridTrack.NamingConventions.csproj --configuration Release -- --report-trx --report-trx-filename naming-test-results.trx --results-directory ./TestResults/NamingConventions
  
  test-application:
    desc: Run application unit tests
    cmds:
      - dotnet run --project ./GridTrack.Application.UnitTests/GridTrack.Application.UnitTests.csproj --configuration Release -- --report-trx --report-trx-filename application-unit-test-results.trx --results-directory ./TestResults/ApplicationUnit
  
  test-infrastructure-unit:
    desc: Run infrastructure unit tests
    cmds:
      - dotnet run --project ./GridTrack.Infrastructure.UnitTests/GridTrack.Infrastructure.UnitTests.csproj --configuration Release -- --report-trx --report-trx-filename infrastructure-unit-test-results.trx --results-directory ./TestResults/InfrastructureUnit
  
  test-integration:
    desc: Run integration tests
    cmds:
      - dotnet run --project ./GridTrack.IntegrationTests/GridTrack.IntegrationTests.csproj --configuration Release -- --report-trx --report-trx-filename integration-test-results.trx --results-directory ./TestResults/Integration

  test-e2e:
    desc: Run E2E tests (requires Docker + gridtrack-forecasting repo)
    cmds:
      - dotnet run --project ./GridTrack.E2ETests/GridTrack.E2ETests.csproj --configuration Release -- --report-trx --report-trx-filename e2e-test-results.trx --results-directory ./TestResults/E2E

  test-all:
    desc: Run all tests
    deps: [ test-architecture, test-domain, test-namingconventions, test-application, test-infrastructure-unit, test-integration, test-e2e ]

  # ============================================
  # COVERAGE TASKS
  # ============================================
  
  coverage-domain:
    desc: Domain unit tests with coverage
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - dotnet-coverage collect
        "dotnet run --project ./GridTrack.Domain.UnitTests/GridTrack.Domain.UnitTests.csproj --configuration Release --no-build"
        -f xml -o {{.COVERAGE_DIR}}/domain.xml
  
  coverage-application:
    desc: Application unit tests with coverage
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - dotnet-coverage collect
        "dotnet run --project ./GridTrack.Application.UnitTests/GridTrack.Application.UnitTests.csproj --configuration Release --no-build"
        -f xml -o {{.COVERAGE_DIR}}/application.xml
  
  coverage-infrastructure:
    desc: Infrastructure unit tests with coverage
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - dotnet-coverage collect
        "dotnet run --project ./GridTrack.Infrastructure.UnitTests/GridTrack.Infrastructure.UnitTests.csproj --configuration Release --no-build"
        -f xml -o {{.COVERAGE_DIR}}/infrastructure.xml
  
  coverage-e2e:
    desc: E2E tests with coverage (requires Docker + forecasting repo)
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - dotnet-coverage collect
        "dotnet run --project ./GridTrack.E2ETests/GridTrack.E2ETests.csproj --configuration Release"
        -f xml -o {{.COVERAGE_DIR}}/e2e.xml
  
  coverage-integration:
    desc: Integration tests with coverage (requires Docker)
    cmds:
      - mkdir -p {{.COVERAGE_DIR}}
      - dotnet-coverage collect
        "dotnet run --project ./GridTrack.IntegrationTests/GridTrack.IntegrationTests.csproj --configuration Release"
        -f xml -o {{.COVERAGE_DIR}}/integration.xml
        --include "[GridTrack.Api]*,[GridTrack.Application]*,[GridTrack.Infrastructure]*,[GridTrack.Domain]*"
        --exclude "[xunit*]*,[TUnit*]*,[Testcontainers*]*,[*]IntegrationTests.*"
  
  coverage-report:
    desc: Merge coverage files and generate HTML + summary report
    cmds:
      - dotnet-coverage merge {{.COVERAGE_DIR}}/*.xml -f xml -o {{.COVERAGE_DIR}}/merged.xml
      - reportgenerator
        -reports:"{{.COVERAGE_DIR}}/merged.xml"
        -targetdir:"{{.REPORT_DIR}}"
        -reporttypes:"Html;Cobertura;MarkdownSummaryGithub"
        -title:"GridTrack Coverage"
        -assemblyfilters:"+GridTrack.*"
  
  coverage:
    desc: Run all tests with coverage then generate report
    cmds:
      - task: coverage-domain
      - task: coverage-application
      - task: coverage-infrastructure
      - task: coverage-integration
      - task: coverage-e2e
      - task: coverage-report


  # ============================================
  # UPDATE README FILE TASKS
  # ============================================

  update-readme-coverage:
    desc: Parse Cobertura.xml and update README.md coverage table
    cmds:
      - python3 scripts/update_readme_coverage.py

  # ============================================
  # DOCKER COMPOSE TASKS
  # ============================================

  compose-up:
    desc: Start services with Docker Compose
    cmds:
      - docker compose up -d --wait

  compose-down:
    desc: Stop Docker Compose services
    cmds:
      - docker compose down -v

  compose-logs:
    desc: Show Docker Compose logs
    cmds:
      - docker compose logs -f

  # ============================================
  # PIPELINE TASKS (Complete Workflows)
  # ============================================

  ci:
    desc: Run CI pipeline (build + tests)
    cmds:
      - task: build
      - task: coverage
      - task: update-readme-coverage
      - task: test-integration

  cd-compose:
    desc: Deploy with Docker Compose
    cmds:
      - task: compose-down
      - task: compose-up
      - echo "✅ Services started! API available at http://localhost:8000"


  # ============================================
  # UTILITY TASKS
  # ============================================

  clean:
    desc: Clean all resources
    cmds:
      - task: compose-down
      - dotnet clean
      - rm -rf ./TestResults

  help:
    desc: Show available tasks
    cmds:
      - task --list